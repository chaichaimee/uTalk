summary = "uTalk"
description = """Улучшите работу с буфером обмена: отслеживает такие действия, как копирование, вырезание и вставка, превращая стандартные системные оповещения в настраиваемые голоса, ограниченные только вашим воображением.
Горячая клавиша:
NVDA+ALT+T
Одинарное нажатие: переключить язык
Двойное нажатие: открыть настройки uTalk"""