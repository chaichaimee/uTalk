summary = "uTalk"
description = """Расширьте возможности работы с буфером обмена: отслеживает такие действия, как копирование, вырезание, вставка и т. д., превращая стандартные системные оповещения в настраиваемые голоса, ограниченные только вашим воображением.
Горячая клавиша:
NVDA+ALT+T
Одиночное нажатие: переключить язык
Двойное нажатие: открыть настройки uTalk"""